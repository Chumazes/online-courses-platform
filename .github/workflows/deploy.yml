name: Deploy to Local Server via Tailscale

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:  # Ручной запуск

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: 8.0.x
    
    - name: Restore dependencies
      run: dotnet restore
    
    - name: Build API
      run: dotnet build --configuration Release --no-restore
    
    - name: Publish API
      run: dotnet publish OnlineCourses.API/OnlineCourses.API.csproj -c Release -o ./publish/api
    
    - name: Publish Desktop App
      run: dotnet publish OnlineCourses.Desktop/OnlineCourses.Desktop.csproj -c Release -o ./publish/desktop
    
    - name: Prepare deployment package
      run: |
        mkdir -p deploy
        cp -r ./publish/api/* deploy/
        cp -r ./publish/desktop deploy/desktop/
        cp ./OnlineCourses.API/appsettings.json deploy/appsettings.example.json
        
    - name: Upload to Tailscale server
      uses: appleboy/scp-action@v0.1.4
      with:
        host: ${{ secrets.TAILSCALE_IP }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: 22
        source: "./deploy/*"
        target: "/home/${{ secrets.SERVER_USER }}/online-courses/"
        strip_components: 1
    
    - name: Restart API service via SSH
      uses: appleboy/ssh-action@v0.1.5
      with:
        host: ${{ secrets.TAILSCALE_IP }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: 22
        script: |
          cd /home/${{ secrets.SERVER_USER }}/online-courses
          chmod +x OnlineCourses.API
          
          # Создать systemd сервис если его нет
          if [ ! -f /etc/systemd/system/onlinecourses-api.service ]; then
            sudo bash -c 'cat > /etc/systemd/system/onlinecourses-api.service << EOF
[Unit]
Description=Online Courses API
After=network.target postgresql.service

[Service]
Type=simple
User=${{ secrets.SERVER_USER }}
WorkingDirectory=/home/${{ secrets.SERVER_USER }}/online-courses
ExecStart=/home/${{ secrets.SERVER_USER }}/online-courses/OnlineCourses.API
Restart=always
RestartSec=10

[Install]
WantedBy=multi-user.target
EOF'
            sudo systemctl daemon-reload
          fi
          
          sudo systemctl restart onlinecourses-api
          sudo systemctl enable onlinecourses-api
          
          echo "✅ API deployed and restarted on Tailscale IP: ${{ secrets.TAILSCALE_IP }}"