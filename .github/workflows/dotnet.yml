name: .NET CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
    
    - name: Restore dependencies
      run: dotnet restore
    
    - name: Build API and Data projects (skip Windows Desktop)
      run: |
        dotnet build OnlineCourses.API/OnlineCourses.API.csproj --configuration Release --no-restore
        dotnet build OnlineCourses.Data/OnlineCourses.Data.csproj --configuration Release --no-restore
        dotnet build OnlineCourses.Models/OnlineCourses.Models.csproj --configuration Release --no-restore
    
    - name: Test
      run: dotnet test OnlineCourses.Tests/OnlineCourses.Tests.csproj --configuration Release --verbosity normal