name: CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  dotnet:
    name: .NET build and tests
    runs-on: windows-latest

    env:
      DOTNET_NOLOGO: true
      DOTNET_CLI_TELEMETRY_OPTOUT: true

    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
    
    - name: Restore
      run: dotnet restore OnlineCourses.Tests/OnlineCourses.Tests.csproj
    
    - name: Build API
      run: dotnet build OnlineCourses.API/OnlineCourses.API.csproj --configuration Release --no-restore

    - name: Build tests
      run: dotnet build OnlineCourses.Tests/OnlineCourses.Tests.csproj --configuration Release --no-restore
    
    - name: Run tests
      run: dotnet test OnlineCourses.Tests/OnlineCourses.Tests.csproj --configuration Release --no-build --logger "trx;LogFileName=test-results.trx" --results-directory OnlineCourses.Tests/TestResults

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: OnlineCourses.Tests/TestResults/test-results.trx

    - name: Upload logs on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: logs
        path: logs/**/*.log
        if-no-files-found: ignore

  react:
    name: React build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: OnlineCourses.Web

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: npm
        cache-dependency-path: OnlineCourses.Web/package-lock.json

    - name: Install dependencies
      run: npm ci

    - name: Build React app
      run: npm run build

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [dotnet, react]

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Build API image
      run: docker build -f OnlineCourses.API/Dockerfile -t online-courses-api:ci .

    - name: Build React image
      run: docker build -f OnlineCourses.Web/Dockerfile -t online-courses-web:ci OnlineCourses.Web
