services:
  postgres:
    image: postgres:16-alpine
    container_name: online-courses-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-online_courses}
      POSTGRES_USER: ${POSTGRES_USER:-online_courses}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-online_courses_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-online_courses} -d ${POSTGRES_DB:-online_courses}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    container_name: online-courses-api
    restart: unless-stopped
    build:
      context: .
      dockerfile: OnlineCourses.API/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ASPNETCORE_URLS: http://+:8080
      DatabaseProvider: Postgres
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=${POSTGRES_DB:-online_courses};Username=${POSTGRES_USER:-online_courses};Password=${POSTGRES_PASSWORD:-online_courses_password}
      JwtSettings__Secret: ${JWT_SECRET:-change-this-secret-before-deploying-online-courses}
      JwtSettings__Issuer: ${JWT_ISSUER:-OnlineCoursesAPI}
      JwtSettings__Audience: ${JWT_AUDIENCE:-OnlineCoursesClient}
      BaseUrl: ${API_BASE_URL:-http://localhost:8080}
    ports:
      - "${API_PORT:-8080}:8080"
    volumes:
      - ./logs:/app/logs
      - ./uploads:/app/wwwroot/uploads
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/api/test/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  web:
    container_name: online-courses-web
    restart: unless-stopped
    build:
      context: OnlineCourses.Web
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
    depends_on:
      - api
    ports:
      - "${WEB_PORT:-3000}:80"
    volumes:
      - ./logs/web:/var/log/nginx

volumes:
  postgres_data:
